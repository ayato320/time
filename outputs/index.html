<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>研究室ステータスボード</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18212f;
      --muted: #657086;
      --line: #d9e0ea;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --lab: #126c4f;
      --campus: #1f5f9f;
      --out: #9a4d18;
      --shadow: 0 14px 34px rgba(26, 38, 64, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.7rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .clock {
      flex: 0 0 auto;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 16px;
      margin-bottom: 18px;
    }

    .new-member,
    .filters {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .new-member {
      flex-wrap: wrap;
    }

    .new-member input {
      min-width: 190px;
      flex: 1 1 190px;
    }

    input,
    select {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
    }

    button {
      height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      background: #18212f;
      color: white;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .summary-item {
      padding: 16px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .summary-item strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
      margin-bottom: 8px;
    }

    .summary-item span {
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .member {
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-top: 6px solid var(--status-color);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .member-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .member h2 {
      margin: 0 0 4px;
      font-size: 1.25rem;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--status-color) 12%, white);
      color: var(--status-color);
      font-weight: 700;
      white-space: nowrap;
    }

    .updated {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .status-buttons button {
      padding: 0 8px;
      background: #f4f6f9;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .status-buttons button.active {
      background: var(--status-color);
      color: #fff;
      border-color: var(--status-color);
    }

    .note-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .note {
      margin: 0;
      min-height: 24px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .empty {
      display: none;
      padding: 28px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
    }

    .empty.show {
      display: block;
    }

    @media (max-width: 780px) {
      .app {
        width: min(100% - 22px, 1180px);
        padding-top: 18px;
      }

      header,
      .toolbar {
        grid-template-columns: 1fr;
        display: grid;
      }

      .clock {
        width: 100%;
      }

      .filters {
        overflow-x: auto;
      }

      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>研究室ステータスボード</h1>
        <p class="lead">研究室内・学内・外出を、メンバーごとにすぐ確認できます。</p>
      </div>
      <div class="clock" id="clock">--:--</div>
    </header>

    <section class="toolbar" aria-label="操作">
      <form class="new-member" id="memberForm">
        <input id="nameInput" autocomplete="off" placeholder="メンバー名">
        <select id="statusInput" aria-label="初期ステータス">
          <option value="lab">研究室内</option>
          <option value="campus">学内</option>
          <option value="out">外出</option>
        </select>
        <input id="noteInput" autocomplete="off" placeholder="メモ（例: 14時まで講義）">
        <button type="submit">追加</button>
      </form>

      <div class="filters" role="group" aria-label="表示フィルター">
        <button class="secondary" type="button" data-filter="all">全員</button>
        <button class="secondary" type="button" data-filter="lab">研究室内</button>
        <button class="secondary" type="button" data-filter="campus">学内</button>
        <button class="secondary" type="button" data-filter="out">外出</button>
      </div>
    </section>

    <section class="summary" aria-label="人数集計">
      <div class="summary-item">
        <strong id="labCount">0</strong>
        <span>研究室内</span>
      </div>
      <div class="summary-item">
        <strong id="campusCount">0</strong>
        <span>研究室以外の学内</span>
      </div>
      <div class="summary-item">
        <strong id="outCount">0</strong>
        <span>外出</span>
      </div>
    </section>

    <section class="grid" id="memberGrid" aria-label="メンバー一覧"></section>
    <p class="empty" id="emptyState">表示できるメンバーがいません。</p>
  </main>

  <script>
    const STORAGE_KEY = "lab-status-board-v1";
    const labels = {
      lab: "研究室内",
      campus: "学内",
      out: "外出"
    };
    const colors = {
      lab: "#126c4f",
      campus: "#1f5f9f",
      out: "#9a4d18"
    };

    let filter = "all";
    let members = loadMembers();

    const grid = document.querySelector("#memberGrid");
    const empty = document.querySelector("#emptyState");
    const form = document.querySelector("#memberForm");
    const nameInput = document.querySelector("#nameInput");
    const statusInput = document.querySelector("#statusInput");
    const noteInput = document.querySelector("#noteInput");

    function loadMembers() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch {
          localStorage.removeItem(STORAGE_KEY);
        }
      }

      return [
        { id: crypto.randomUUID(), name: "山田さん", status: "lab", note: "実験中", updatedAt: new Date().toISOString() },
        { id: crypto.randomUUID(), name: "佐藤さん", status: "campus", note: "図書館", updatedAt: new Date().toISOString() },
        { id: crypto.randomUUID(), name: "鈴木さん", status: "out", note: "出張", updatedAt: new Date().toISOString() }
      ];
    }

    function saveMembers() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(members));
    }

    function formatTime(value) {
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function renderClock() {
      document.querySelector("#clock").textContent = new Intl.DateTimeFormat("ja-JP", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(new Date());
    }

    function renderSummary() {
      const counts = { lab: 0, campus: 0, out: 0 };
      members.forEach((member) => counts[member.status] += 1);
      document.querySelector("#labCount").textContent = counts.lab;
      document.querySelector("#campusCount").textContent = counts.campus;
      document.querySelector("#outCount").textContent = counts.out;
    }

    function renderMembers() {
      const visible = members.filter((member) => filter === "all" || member.status === filter);
      grid.innerHTML = "";
      empty.classList.toggle("show", visible.length === 0);

      visible.forEach((member) => {
        const card = document.createElement("article");
        card.className = "member";
        card.style.setProperty("--status-color", colors[member.status]);
        card.innerHTML = `
          <div class="member-top">
            <div>
              <h2>${escapeHtml(member.name)}</h2>
              <div class="updated">更新 ${formatTime(member.updatedAt)}</div>
            </div>
            <span class="badge">${labels[member.status]}</span>
          </div>
          <div class="status-buttons" role="group" aria-label="${escapeHtml(member.name)}の状態変更">
            ${Object.entries(labels).map(([status, label]) => `
              <button type="button" data-action="status" data-id="${member.id}" data-status="${status}" class="${status === member.status ? "active" : ""}">${label}</button>
            `).join("")}
          </div>
          <div class="note-row">
            <input value="${escapeAttribute(member.note || "")}" placeholder="メモ">
            <button class="secondary" type="button" data-action="save-note" data-id="${member.id}">保存</button>
          </div>
          <p class="note">${member.note ? escapeHtml(member.note) : "メモなし"}</p>
          <button class="secondary" type="button" data-action="delete" data-id="${member.id}">削除</button>
        `;
        grid.appendChild(card);
      });
    }

    function renderFilters() {
      document.querySelectorAll("[data-filter]").forEach((button) => {
        button.style.background = button.dataset.filter === filter ? "#18212f" : "#fff";
        button.style.color = button.dataset.filter === filter ? "#fff" : "#18212f";
      });
    }

    function render() {
      renderSummary();
      renderFilters();
      renderMembers();
      saveMembers();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = nameInput.value.trim();
      if (!name) {
        nameInput.focus();
        return;
      }

      members.unshift({
        id: crypto.randomUUID(),
        name,
        status: statusInput.value,
        note: noteInput.value.trim(),
        updatedAt: new Date().toISOString()
      });

      form.reset();
      statusInput.value = "lab";
      render();
    });

    document.querySelector(".filters").addEventListener("click", (event) => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;
      filter = button.dataset.filter;
      render();
    });

    grid.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      const id = button.dataset.id;
      const member = members.find((item) => item.id === id);
      if (!member) return;

      if (button.dataset.action === "status") {
        member.status = button.dataset.status;
        member.updatedAt = new Date().toISOString();
      }

      if (button.dataset.action === "save-note") {
        const input = button.parentElement.querySelector("input");
        member.note = input.value.trim();
        member.updatedAt = new Date().toISOString();
      }

      if (button.dataset.action === "delete") {
        members = members.filter((item) => item.id !== id);
      }

      render();
    });

    renderClock();
    render();
    setInterval(renderClock, 30000);
  </script>
</body>
</html>
